name: Build Release Artifacts

on:
  push:
    branches:
      - main
      - test
      - alpha
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-dist
            python_version: "3.13"
            node_version: "24"
          - os: macos-latest
            artifact_name: macos-dist
            python_version: "3.13"
            node_version: "24"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm package

      - name: Verify Python binaries were produced
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f packages/danmaku-core/run.exe
            test -f packages/danmaku-core/receiver.exe
            test -f packages/danmaku-core/sender.exe
          else
            test -f packages/danmaku-core/run
            test -f packages/danmaku-core/receiver
            test -f packages/danmaku-core/sender
          fi

      - name: Verify packaged app contains danmaku-core binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $base = Join-Path $PWD "dist\win-unpacked\resources\danmaku-core"
          if (!(Test-Path $base)) {
            Write-Error "Packaged danmaku-core directory missing: $base"
          }
          @("run.exe", "receiver.exe", "sender.exe") | ForEach-Object {
            $target = Join-Path $base $_
            if (!(Test-Path $target)) {
              Write-Error "Missing packaged binary: $target"
            }
          }

      - name: Verify packaged app contains danmaku-core binaries (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_dir=$(find dist -maxdepth 2 -type d -name "*.app" | head -n 1)
          test -n "$app_dir"
          base="$app_dir/Contents/Resources/danmaku-core"
          test -d "$base"
          test -f "$base/run"
          test -f "$base/receiver"
          test -f "$base/sender"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error
