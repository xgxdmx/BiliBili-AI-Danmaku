name: Build Desktop

on:
  push:
    branches: [alpha, main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CI: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/danmaku-core/requirements.txt
          pip install pyinstaller
          pip show blivedm || echo "::warning::blivedm not installed from requirements.txt, build.mjs will retry"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Package
        run: node scripts/build.mjs all

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: BiliBili-AI-Danmaku-Setup-${{ github.ref_name }}-${{ github.sha }}
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish to GitHub Release
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          short_sha="${{ github.sha }}"
          short_sha="${short_sha:0:7}"
          exe=$(ls dist/*.exe | head -1)

          gh release create "V$version" "$exe" \
            --title "BiliBili-AI-Danmaku V$version" \
            --target "${{ github.sha }}" \
            --notes ""

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/danmaku-core/requirements.txt
          pip install pyinstaller
          pip show blivedm || echo "::warning::blivedm not installed from requirements.txt, build.mjs will retry"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Package
        run: node scripts/build.mjs all

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiliBili-AI-Danmaku-macOS-${{ github.ref_name }}-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 30
