packages:
  - "packages/*"

# pnpm v11 构建脚本白名单（pnpm v11 已移除 onlyBuiltDependencies 列表，
# 改用 allowBuilds 映射：pkg: true 允许 postinstall，false 显式拒绝）。
# strictDepBuilds 在 v11 默认为 true，未在此声明的构建脚本会导致
# ERR_PNPM_IGNORED_BUILDS 并以退出码 1 终止 CI。
allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  sharp: true
  "@matrix-org/matrix-sdk-crypto-nodejs": true
  koffi: true
  protobufjs: true
  openclaw: true